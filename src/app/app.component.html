<div class="container">

  <h1> Gestor de Tareas</h1>

  <div class="stats">
    <p>Total: {{ totalTasks() }}</p>
    <p> Completadas: {{ completedTasks() }}</p>
    <p> Pendientes: {{ pendingTasks() }}</p>
  </div>

  <app-task-form (taskCreated)="addTask($event)">
  </app-task-form>

  <app-task-list [tasks]="tasks" (deleteTask)="deleteTask($event)" (completeTask)="completeTask($event)">
  </app-task-list>

</div>
